services:
  postgres:
    image: postgres:16-alpine
    container_name: jsp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jsp
      POSTGRES_PASSWORD: jsp
      POSTGRES_DB: job_scheduler
    ports:
      # Host port 5433 -> avoid colliding with a default local/other-project Postgres on 5432.
      - "5433:5432"
    volumes:
      - jsp_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jsp -d job_scheduler"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: jsp-redis
    restart: unless-stopped
    ports:
      # Host port 6380 -> avoid colliding with a default local/other-project Redis on 6379.
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  jsp_pg_data:
