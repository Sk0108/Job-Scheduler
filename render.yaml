databases:
  - name: jsp-postgres
    databaseName: job_scheduler
    user: jsp
    plan: free

services:
  # Render's free tier for Key Value (Redis) was discontinued; pick a paid
  # plan here, or point REDIS_URL at an external Redis instance instead.
  - type: redis
    name: jsp-redis
    ipAllowList: []
    plan: starter

  - type: web
    name: jsp-api
    runtime: node
    plan: free
    buildCommand: npm ci && npm run db:generate && npm run build && npm run db:migrate:deploy
    startCommand: node packages/api/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: jsp-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: jsp-redis
          type: redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      # Set this to your deployed Vercel URL (e.g. https://your-app.vercel.app)
      - key: CORS_ORIGIN
        sync: false

  - type: worker
    name: jsp-worker
    runtime: node
    plan: free
    buildCommand: npm ci && npm run db:generate && npm run build
    startCommand: node packages/worker/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: jsp-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: jsp-redis
          type: redis
          property: connectionString
      - key: WORKER_CONCURRENCY
        value: "5"
      - key: WORKER_POLL_INTERVAL_MS
        value: "750"
      - key: WORKER_HEARTBEAT_INTERVAL_MS
        value: "5000"
      - key: WORKER_QUEUES
        value: "*"

  - type: worker
    name: jsp-scheduler
    runtime: node
    plan: free
    buildCommand: npm ci && npm run db:generate && npm run build
    startCommand: node packages/scheduler/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: jsp-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: jsp-redis
          type: redis
          property: connectionString
      - key: SCHEDULER_TICK_MS
        value: "1000"
