databases:
  - name: jsp-postgres
    databaseName: job_scheduler
    user: jsp
    plan: free

services:
  - type: redis
    name: jsp-redis
    ipAllowList: []
    plan: free

  # Runs the api, worker, and scheduler together in one process (see
  # packages/api/src/start-combined.ts) so the whole backend fits on a single free
  # Render web service. Trade-off: free web services sleep after 15 min with no
  # HTTP traffic, so job processing pauses until a request wakes it back up.
  - type: web
    name: jsp-app
    runtime: node
    plan: free
    buildCommand: npm ci && npm run db:generate && npm run build
    startCommand: npm run db:migrate:deploy && node packages/api/dist/start-combined.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: jsp-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: jsp-redis
          type: redis
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      # Set this to your deployed Vercel URL (e.g. https://your-app.vercel.app)
      - key: CORS_ORIGIN
        sync: false
      - key: WORKER_CONCURRENCY
        value: "5"
      - key: WORKER_POLL_INTERVAL_MS
        value: "750"
      - key: WORKER_HEARTBEAT_INTERVAL_MS
        value: "5000"
      - key: WORKER_QUEUES
        value: "*"
      - key: SCHEDULER_TICK_MS
        value: "1000"
